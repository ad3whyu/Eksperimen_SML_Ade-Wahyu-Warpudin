name: ML Preprocessing Workflow Ade-Wahyu

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pandas numpy scikit-learn; fi

      - name: Execute Preprocessing Script
        run: python preprocessing/automate_Ade-Wahyu-Warpudin.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Force add folder output jika baru dibuat
          git add preprocessing/used_car_price_dataset_extended_preprocessing/ || true
          git commit -m "Update: Preprocessed Data Otomatis" || echo "Tidak ada perubahan untuk di-commit"
          git push